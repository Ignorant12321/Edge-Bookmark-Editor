<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title id="pageTitle" data-i18n="page.title">Edge收藏夹编辑器</title>
<link rel="icon" href="/favicon.ico" />
<link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
<div class="app">
    <div class="topbar">
    <div class="brand">
      <div class="logo"><img src="./assets/image/favicon.webp" alt="App Logo" /></div>
      <div class="brand-title-with-tip">
        <span data-i18n="brand.title">Edge收藏夹编辑器</span>
        <span class="help-tip help-tip-topbar" tabindex="0" data-i18n-aria-label="tooltip.app.aria">
          ⓘ
          <span class="help-pop" role="tooltip">
            <span class="help-pop-title" data-i18n="tooltip.app.title">应用说明</span>
            <ul class="help-pop-list" data-i18n-list="tooltip.app.items"></ul>
          </span>
        </span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="filter-bar">
        <div class="search-filter-split">
          <div class="search-wrap">
            <input class="search-input" id="searchInput" data-i18n-placeholder="search.placeholder" placeholder="搜索文件夹名、网站名、网址..." />
            <button class="clear-btn" id="btnClearSearch" data-i18n-title="search.clear" title="清空">×</button>
          </div>
          <div class="menu-wrap search-filter-mode-wrap" id="filterMenuWrap">
            <button class="btn search-filter-mode-btn" id="filterMenuBtn" data-i18n-title="filters.open" data-i18n-aria-label="filters.open" title="打开筛选" aria-label="打开筛选">▾</button>
            <div class="menu-pop filter-menu-pop">
              <div class="filter-menu-row">
                <label for="searchScope" data-i18n="filters.scope">范围</label>
                <select class="select" id="searchScope">
                  <option value="all" data-i18n="scope.all">全部收藏</option>
                  <option value="subtree" data-i18n="scope.subtree">当前及子文件夹</option>
                  <option value="current" data-i18n="scope.current">当前文件夹</option>
                </select>
              </div>
              <div class="filter-menu-row">
                <label for="typeFilter" data-i18n="filters.type">类型</label>
                <select class="select" id="typeFilter">
                  <option value="all" data-i18n="type.all">全部类型</option>
                  <option value="folder" data-i18n="type.folder">仅文件夹</option>
                  <option value="bookmark" data-i18n="type.bookmark">仅网址</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="toolbar-actions">
        <div class="toolbar-group toolbar-group-fetch">
          <button class="btn toolbar-main-btn toolbar-fetch-btn" id="btnFetchMissingIcons" data-i18n="btn.fetchMissingIcons" data-i18n-title="btn.fetchMissingIconsTitle" title="一键获取缺失ICON">获取ICON</button>
        </div>
        <div class="toolbar-group toolbar-group-io">
          <div class="menu-bar">
            <div class="menu-wrap" id="importMenuWrap">
              <button class="btn toolbar-main-btn" id="importMenuBtn" data-i18n="menu.import">导入 ▾</button>
              <div class="menu-pop">
                <button id="actionImportHtml" data-i18n="menu.html">HTML</button>
                <button id="actionImportJson" data-i18n="menu.json">JSON</button>
                <button id="actionLoadSample" data-i18n="menu.preloaded">预置</button>
              </div>
            </div>
            <div class="menu-wrap" id="exportMenuWrap">
              <button class="btn primary toolbar-main-btn" id="exportMenuBtn" data-i18n="menu.export">导出 ▾</button>
              <div class="menu-pop">
                <button id="actionExportHtml" data-i18n="menu.html">HTML</button>
                <button id="actionExportJson" data-i18n="menu.json">JSON</button>
              </div>
            </div>
          </div>
        </div>
        <div class="toolbar-group toolbar-group-appearance">
          <button class="lang-icon-btn" id="langToggleBtn" data-i18n-title="btn.langToggleTitle" data-i18n-aria-label="btn.langToggleAria" title="切换语言" aria-label="切换语言">
            <span class="lang-glyph" aria-hidden="true">中文</span>
          </button>
          <button class="theme-switch-btn" id="themeToggleBtn" data-i18n-title="btn.themeToggleTitle" data-i18n-aria-label="btn.themeToggleAria" title="切换主题" aria-label="切换主题" aria-pressed="false">
            <span class="theme-switch-track" aria-hidden="true">
              <span class="theme-switch-thumb">
                <span class="theme-sun">☀</span>
                <span class="theme-moon">☾</span>
              </span>
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="workspace">
    <section class="panel">
      <div class="panel-header">
        <div class="panel-title panel-title-with-tip">
          <span class="tree-title-locate" id="btnLocateTree" tabindex="0" role="button" data-i18n="panel.tree" data-i18n-title="tree.locate" data-i18n-aria-label="tree.locate" title="定位到目录" aria-label="定位到目录">目录</span>
          <span class="help-tip" tabindex="0" data-i18n-aria-label="tooltip.tree.aria">
            ⓘ
            <span class="help-pop" role="tooltip">
              <span class="help-pop-title" data-i18n="tooltip.tree.title">目录区</span>
              <ul class="help-pop-list" data-i18n-list="tooltip.tree.items"></ul>
            </span>
          </span>
        </div>
        <div class="panel-subtools"><div class="tag" id="stats"></div></div>
      </div>
      <div class="panel-body tree-body">
        <div class="tree-scroll-outer"><div class="tree-scroll"><div class="tree" id="tree"></div></div></div>
      </div>
    </section>

    <div class="splitter" id="splitterLeft"></div>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title panel-title-with-tip">
          <span id="listTitle" data-i18n="panel.content">内容</span>
          <span class="help-tip" tabindex="0" data-i18n-aria-label="tooltip.content.aria">
            ⓘ
            <span class="help-pop" role="tooltip">
              <span class="help-pop-title" data-i18n="tooltip.content.title">内容区</span>
              <ul class="help-pop-list" data-i18n-list="tooltip.content.items"></ul>
            </span>
          </span>
        </div>
        <div class="panel-subtools">
          <div class="tag" id="listStats"></div>
          <button class="btn" id="btnAddFolderCenter" data-i18n="btn.addFolder">新建文件夹</button>
          <button class="btn" id="btnAddBookmark" data-i18n="btn.addBookmark">添加网址</button>
        </div>
      </div>
      <div class="breadcrumbs-wrap">
        <div class="breadcrumbs" id="breadcrumbs"></div>
      </div>
      <div class="panel-body content-body" id="contentPanelBody">
        <div class="list" id="list"></div>
      </div>
    </section>

    <div class="splitter" id="splitterRight"></div>

    <section class="panel">
      <div class="panel-header">
        <div class="panel-title panel-title-with-tip">
          <span data-i18n="panel.editor">编辑器</span>
          <span class="help-tip" tabindex="0" data-i18n-aria-label="tooltip.editor.aria">
            ⓘ
            <span class="help-pop" role="tooltip">
              <span class="help-pop-title" data-i18n="tooltip.editor.title">编辑区</span>
              <ul class="help-pop-list" data-i18n-list="tooltip.editor.items"></ul>
            </span>
          </span>
        </div>
        <div class="tag" id="editorType" data-i18n="editor.type.none">未选择</div>
      </div>
      <div class="panel-body">
        <div id="editorEmpty" class="empty" data-i18n="editor.empty">从目录区或内容区选中一个文件夹 / 网址后，即可在这里编辑。</div>
        <div id="editorForm" class="hidden">
          <div class="field">
            <label class="label-with-tip">
              <span data-i18n="editor.label.name">名称</span>
              <span class="help-tip help-tip-sm" tabindex="0" data-i18n-aria-label="tooltip.name.aria">
                ⓘ
                <span class="help-pop" role="tooltip">
                  <span class="help-pop-title" data-i18n="tooltip.name.title">名称</span>
                  <ul class="help-pop-list" data-i18n-list="tooltip.name.items"></ul>
                </span>
              </span>
            </label>
            <input class="input" id="editTitle" />
          </div>
          <div class="field" id="fieldUrl">
            <label class="label-with-tip">
              <span data-i18n="editor.label.url">网址</span>
              <span class="help-tip help-tip-sm" tabindex="0" data-i18n-aria-label="tooltip.url.aria">
                ⓘ
                <span class="help-pop" role="tooltip">
                  <span class="help-pop-title" data-i18n="tooltip.url.title">网址</span>
                  <ul class="help-pop-list" data-i18n-list="tooltip.url.items"></ul>
                </span>
              </span>
            </label>
            <input class="input" id="editHref" />
          </div>
          <div class="field hidden" id="fieldIcon">
            <label class="label-with-tip">
              <span data-i18n="editor.label.icon">ICON</span>
              <span class="help-tip help-tip-sm" tabindex="0" data-i18n-aria-label="tooltip.icon.aria">
                ⓘ
                <span class="help-pop" role="tooltip">
                  <span class="help-pop-title" data-i18n="tooltip.icon.title">ICON</span>
                  <ul class="help-pop-list" data-i18n-list="tooltip.icon.items"></ul>
                </span>
              </span>
            </label>
            <div class="icon-inline-row">
              <div class="icon-preview-block">
                <img id="iconPreview" class="icon-preview-image hidden" data-i18n-alt="editor.iconPreviewAlt" alt="ICON预览" />
                <span id="iconPreviewFallback" class="icon-preview-fallback">🌐</span>
              </div>
              <div class="icon-edit-block">
                <input class="input" id="editIcon" data-i18n-placeholder="editor.iconPlaceholder" placeholder="支持 data:image... / http(s)链接 / 原始Base64" />
              </div>
            </div>
            <div class="panel-subtools">
              <div class="icon-fetch-split">
                <button class="btn icon-fetch-main-btn" id="btnFetchIconNow" data-i18n="editor.btn.fetchIcon">网络获取</button>
                <div class="menu-wrap icon-fetch-mode-wrap" id="iconFetchMenuWrap">
                  <button class="btn icon-fetch-mode-btn" id="iconFetchModeBtn" data-i18n-title="editor.btn.fetchIconMode" data-i18n-aria-label="editor.btn.fetchIconMode" title="选择获取方式" aria-label="选择获取方式">▾</button>
                  <div class="menu-pop icon-fetch-menu-pop">
                    <button data-icon-mode="auto" data-i18n="editor.fetchMode.auto">自动（推荐）</button>
                    <button data-icon-mode="duckduckgo" data-i18n="editor.fetchMode.duckduckgo">DuckDuckGo</button>
                    <button data-icon-mode="favicon" data-i18n="editor.fetchMode.favicon">Favicon.ico</button>
                    <button data-icon-mode="googles2" data-i18n="editor.fetchMode.googles2">Google S2</button>
                  </div>
                </div>
              </div>
              <div class="icon-upload-split">
                <button class="btn icon-upload-main-btn" id="btnPickIconFile" data-i18n="editor.btn.uploadIcon">本地上传</button>
                <div class="menu-wrap icon-upload-size-wrap" id="iconUploadSizeWrap">
                  <button class="btn icon-upload-size-btn" id="iconUploadSizeBtn" data-i18n-title="editor.btn.uploadIconSize" data-i18n-aria-label="editor.btn.uploadIconSize" title="选择本地图标尺寸" aria-label="选择本地图标尺寸">▾</button>
                  <div class="menu-pop icon-upload-size-pop">
                    <button data-icon-upload-size="16" data-i18n="editor.iconSize.s16">16 x 16</button>
                    <button data-icon-upload-size="24" data-i18n="editor.iconSize.s24">24 x 24</button>
                    <button data-icon-upload-size="32" data-i18n="editor.iconSize.s32">32 x 32（推荐）</button>
                    <button data-icon-upload-size="48" data-i18n="editor.iconSize.s48">48 x 48</button>
                    <button data-icon-upload-size="64" data-i18n="editor.iconSize.s64">64 x 64</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="field">
            <label class="label-with-tip">
              <span data-i18n="editor.label.move">移动</span>
              <span class="help-tip help-tip-sm" tabindex="0" data-i18n-aria-label="tooltip.move.aria">
                ⓘ
                <span class="help-pop" role="tooltip">
                  <span class="help-pop-title" data-i18n="tooltip.move.title">移动</span>
                  <ul class="help-pop-list" data-i18n-list="tooltip.move.items"></ul>
                </span>
              </span>
            </label>
            <div class="panel-subtools">
              <button class="btn" id="btnMoveUp" data-i18n="editor.btn.moveUp">上移</button>
              <button class="btn" id="btnMoveDown" data-i18n="editor.btn.moveDown">下移</button>
              <button class="btn" id="btnMove" data-i18n="editor.btn.moveTo">移动到</button>
            </div>
          </div>
          <div class="field">
            <label class="label-with-tip">
              <span data-i18n="editor.label.actions">操作</span>
              <span class="help-tip help-tip-sm" tabindex="0" data-i18n-aria-label="tooltip.actions.aria">
                ⓘ
                <span class="help-pop" role="tooltip">
                  <span class="help-pop-title" data-i18n="tooltip.actions.title">操作</span>
                  <ul class="help-pop-list" data-i18n-list="tooltip.actions.items"></ul>
                </span>
              </span>
            </label>
            <div class="panel-subtools">
              <button class="btn" id="btnCopyAction" data-i18n="editor.btn.copy">复制</button>
              <button class="btn" id="btnDissolve" data-i18n="editor.btn.dissolve">解散</button>
              <button class="btn danger" id="btnDelete" data-i18n="editor.btn.delete">删除</button>
            </div>
          </div>
        </div>
      </div>
      <div class="editor-bottom-tools">
        <div class="editor-bottom-info">
          <div class="editor-bottom-title" data-i18n="editor.bottomActions.title">历史操作</div>
          <div class="editor-bottom-last is-empty" id="historyLastAction" data-i18n="editor.bottomActions.empty">暂无操作记录</div>
        </div>
        <div class="nav-group editor-nav-group" id="navGroup">
          <button class="btn icon-nav-btn" id="btnUndo" data-i18n-title="btn.undo" data-i18n-aria-label="btn.undo" title="撤销" aria-label="撤销">
            <span aria-hidden="true">↶</span>
          </button>
          <button class="btn icon-nav-btn" id="btnRedo" data-i18n-title="btn.redo" data-i18n-aria-label="btn.redo" title="重做" aria-label="重做">
            <span aria-hidden="true">↷</span>
          </button>
          <button class="btn icon-nav-btn" id="btnResetFilters" data-i18n-title="btn.reset" data-i18n-aria-label="btn.reset" title="重置" aria-label="重置">
            <span aria-hidden="true">⟳</span>
          </button>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="modal-mask" id="moveModalMask">
  <div class="modal move-modal">
    <div class="modal-header">
      <div style="font-weight:700;" data-i18n="moveModal.title">移动到文件夹</div>
      <button class="btn" id="btnCloseMoveModal" data-i18n="moveModal.close">关闭</button>
    </div>
    <div class="modal-body move-modal-body">
      <div class="helper move-modal-helper" data-i18n="moveModal.helper">请选择目标文件夹，然后点击底部确认移动。</div>
      <div class="move-modal-tree-wrap">
        <div class="tree-scroll"><div class="tree" id="moveTree"></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" id="btnCancelMove" data-i18n="moveModal.cancel">取消</button>
      <button class="btn primary" id="btnConfirmMove" data-i18n="moveModal.confirm">确认移动</button>
    </div>
  </div>
</div>

<input type="file" id="fileHtml" accept=".html,text/html" class="hidden" />
<input type="file" id="fileJson" accept=".json,application/json" class="hidden" />
<input type="file" id="fileIcon" accept="image/*,.ico,.svg" class="hidden" />
<div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
<script type="module" src="./assets/js/main.js"></script>
</body>
</html>
